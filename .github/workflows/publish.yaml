name: "Tauri Build and Publish"

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      google-playstore-version:
        description: 'Optional: Override Google Play version code'
        required: false
        type: string

jobs:
  # Runs only when the workflow fires on a non-qualifying ref (e.g. feature branch
  # push via required-workflow checks). Ensures at least one job always completes
  # so GitHub doesn't send "No jobs were run" notifications.
  skip-guard:
    name: "Skipped (not main / tag / dispatch)"
    runs-on: ubuntu-latest
    if: github.ref_name != 'main' && github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
    steps:
      - run: echo "Nothing to publish from ${{ github.ref_name }}"

  collect-version:
    if: github.ref_name == 'main' || github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      current_version: ${{ steps.package-version.outputs.version }}
      tag_name: ${{ steps.package-version.outputs.tag_name }}
      draft: "false"
      prerelease: ${{ github.ref_type != 'tag' && 'true' || 'false' }}
      release_body: ${{ steps.release-notes.outputs.release_body }}
      name: ObsidianIRC ${{ steps.package-version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Get Node project version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEXT_PATCH=$((PATCH + 1))
            echo "tag_name=v${MAJOR}.${MINOR}.${NEXT_PATCH}-pre" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute previous release tag and generate notes
        id: release-notes
        run: |
          CURRENT_TAG="$TAG_NAME"
          PREV_TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq "[.[] | select(.prerelease == false and .draft == false and .tag_name != \"$CURRENT_TAG\")] | .[0].tag_name // empty")

          echo "previous_tag_name=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(gh api repos/$GITHUB_REPOSITORY/releases/generate-notes \
              -X POST \
              -f tag_name="$TAG_NAME" \
              -f previous_tag_name="$PREV_TAG" \
              -f target_commitish="$GITHUB_SHA" \
              --jq '.body')
          else
            NOTES="Initial release"
          fi

          FULL_BODY=$(printf '%s\n\n%s' \
            "See the assets to download this version and install." \
            "$NOTES")

          echo "release_body<<__BODY__" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$FULL_BODY" >> "$GITHUB_OUTPUT"
          echo "__BODY__" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.package-version.outputs.tag_name }}

  verify-linux-nix:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify tagged release builds
        run: |
          nix run .#update-npm-deps-hash
          nix flake check && nix build .#obsidianirc --no-link --print-build-logs

      - name: Commit npmDeps hash to main
        run: |
          set -euo pipefail

          # Verify step may patch this file; discard before switching to main.
          git restore nix/obsidianirc.nix

          git fetch origin main
          git checkout main
          git pull --rebase origin main

          nix run .#update-npm-deps-hash

          if git diff --exit-code --quiet -- nix/obsidianirc.nix; then
            echo "npmDeps hash on main is already up to date."
            exit 0
          fi

          nix build .#obsidianirc --no-link --print-build-logs

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/obsidianirc.nix
          git commit -m "build(nix): update npmDeps hash [skip ci]"
          git push origin main

  publish-tauri:
    needs: collect-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Use 22.04 for glibc 2.35 compatibility
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config zsync

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.collect-version.outputs.tag_name }}
          releaseName: ${{ needs.collect-version.outputs.name }}
          releaseBody: ${{ needs.collect-version.outputs.release_body }}
          releaseDraft: ${{ needs.collect-version.outputs.draft == 'true' }}
          prerelease: ${{ needs.collect-version.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}

      - name: Generate zsync files for AppImages
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Find AppImage files
          APPIMAGE_DIR="./src-tauri/target/release/bundle/appimage"
          if [ -d "$APPIMAGE_DIR" ]; then
            for appimage in $APPIMAGE_DIR/*.AppImage; do
              if [ -f "$appimage" ]; then
                echo "Generating zsync for $appimage"
                zsyncmake -o "${appimage}.zsync" "$appimage"
              fi
            done
          fi

      - name: Embed update information in AppImages
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE_DIR="./src-tauri/target/release/bundle/appimage"
          if [ -d "$APPIMAGE_DIR" ]; then
            for appimage in $APPIMAGE_DIR/*_amd64.AppImage; do
              if [ -f "$appimage" ]; then
                echo "Embedding update info in $appimage"
                # Embed update URL at ELF .upd_info offset (33651 bytes) per AppImageUpdate spec.
                # Format: gh-releases-zsync|ORG|REPO|CHANNEL|FILENAME_GLOB
                printf 'gh-releases-zsync|ObsidianIRC|ObsidianIRC|latest|ObsidianIRC_*_amd64.AppImage.zsync' | \
                  dd of="$appimage" bs=1 seek=33651 count=512 conv=notrunc
              fi
            done
          fi

      - name: Upload zsync files
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.collect-version.outputs.tag_name }}
          files: |
            ./src-tauri/target/release/bundle/appimage/*.zsync

  publish-linux-arm:
    runs-on: ubuntu-22.04-arm # Use 22.04 for glibc 2.35 compatibility
    needs: collect-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: install dependencies (ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests curl libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 file pkg-config xdg-utils zsync

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm install

      - name: Build app
        run: npm run tauri build -- --verbose

      - name: Generate zsync files
        run: |
          APPIMAGE_PATH="./src-tauri/target/release/bundle/appimage/ObsidianIRC_${{ needs.collect-version.outputs.current_version}}_aarch64.AppImage"
          if [ -f "$APPIMAGE_PATH" ]; then
            echo "Generating zsync for $APPIMAGE_PATH"
            zsyncmake -o "${APPIMAGE_PATH}.zsync" "$APPIMAGE_PATH"
          fi

      - name: Embed update information in AppImage
        run: |
          APPIMAGE_PATH="./src-tauri/target/release/bundle/appimage/ObsidianIRC_${{ needs.collect-version.outputs.current_version}}_aarch64.AppImage"
          if [ -f "$APPIMAGE_PATH" ]; then
            echo "Embedding update info in $APPIMAGE_PATH"
            # Embed update URL at ELF .upd_info offset (33651 bytes) per AppImageUpdate spec.
            # Format: gh-releases-zsync|ORG|REPO|CHANNEL|FILENAME_GLOB
            printf 'gh-releases-zsync|ObsidianIRC|ObsidianIRC|latest|ObsidianIRC_*_aarch64.AppImage.zsync' | \
              dd of="$APPIMAGE_PATH" bs=1 seek=33651 count=512 conv=notrunc
          fi

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ needs.collect-version.outputs.draft == 'true' }}
          prerelease: ${{ needs.collect-version.outputs.prerelease == 'true' }}
          body: ${{ needs.collect-version.outputs.release_body }}
          name: ${{ needs.collect-version.outputs.name }}
          tag_name: ${{ needs.collect-version.outputs.tag_name }}
          make_latest: ${{ needs.collect-version.outputs.prerelease != 'true' }}
          files: |
            ./src-tauri/target/release/bundle/deb/ObsidianIRC_${{ needs.collect-version.outputs.current_version}}_arm64.deb
            ./src-tauri/target/release/bundle/rpm/ObsidianIRC-${{ needs.collect-version.outputs.current_version}}-1.aarch64.rpm
            ./src-tauri/target/release/bundle/appimage/ObsidianIRC_${{ needs.collect-version.outputs.current_version}}_aarch64.AppImage
            ./src-tauri/target/release/bundle/appimage/ObsidianIRC_${{ needs.collect-version.outputs.current_version}}_aarch64.AppImage.zsync

  publish-android:
    runs-on: ubuntu-latest
    needs: collect-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "22"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "android-builds"

      - name: Install dependencies
        run: npm install

      - name: Build app bundle
        run: npm run tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837

      - name: Extract android signing key from env
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" > src-tauri/gen/android/release.jks.base64
          base64 -d src-tauri/gen/android/release.jks.base64 > src-tauri/gen/android/release.decrypted.jks

      - name: Sign APK and AAB
        run: |
          ${{ env.ANDROID_HOME }}/build-tools/34.0.0/apksigner sign --ks src-tauri/gen/android/release.decrypted.jks \
            --ks-key-alias ${{ secrets.ANDROID_RELEASE_KEY }} \
            --ks-pass pass:${{ secrets.ANDROID_RELEASE_PASSWORD }} \
            --out src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-signed.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --min-sdk-version 22 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --ks src-tauri/gen/android/release.decrypted.jks \
            --ks-key-alias ${{ secrets.ANDROID_RELEASE_KEY }} \
            --ks-pass pass:${{ secrets.ANDROID_RELEASE_PASSWORD }} \
            --out src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release-signed.aab \
              src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab

      - name: Rename APK and AAB file
        run: |
          mv ./src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-signed.apk ./src-tauri/gen/android/app/build/outputs/apk/universal/release/ObsidianIRC-${{ needs.collect-version.outputs.current_version}}.apk
          mv ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release-signed.aab ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/ObsidianIRC-${{ needs.collect-version.outputs.current_version}}.aab

      - name: Upload signed AAB artifact for Google Play
        uses: actions/upload-artifact@v7
        with:
          name: signed-aab
          path: ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/ObsidianIRC-${{ needs.collect-version.outputs.current_version }}.aab
          retention-days: 1

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ needs.collect-version.outputs.draft == 'true' }}
          prerelease: ${{ needs.collect-version.outputs.prerelease == 'true' }}
          body: ${{ needs.collect-version.outputs.release_body }}
          name: ${{ needs.collect-version.outputs.name }}
          tag_name: ${{ needs.collect-version.outputs.tag_name }}
          make_latest: ${{ needs.collect-version.outputs.prerelease != 'true' }}
          files: |
            ./src-tauri/gen/android/app/build/outputs/apk/universal/release/ObsidianIRC-${{ needs.collect-version.outputs.current_version}}.apk
            ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/ObsidianIRC-${{ needs.collect-version.outputs.current_version}}.aab

  publish-android-google-play-internal:
    runs-on: ubuntu-latest
    needs: [collect-version]
    permissions:
      contents: write
      id-token: write
    # Only run on pushes to main branch OR manual workflow dispatch
    if: (github.ref_type == 'branch' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WIF_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/androidpublisher'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "22"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "android-builds"

      - name: Install dependencies
        run: npm install

      - name: Create internal version code
        id: playstore_version
        run: |
          # Check if version is manually overridden via workflow_dispatch
          if [ -n "${{ inputs.google-playstore-version }}" ]; then
            echo "✅ Using manually specified version code: ${{ inputs.google-playstore-version }}"
            echo "version_code=${{ inputs.google-playstore-version }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          FALLBACK_VERSION=$((1000000 + ${{ github.run_number }}))
          echo "Fallback version code: $FALLBACK_VERSION (1,000,000 + run_number)"
          echo "version_code=$FALLBACK_VERSION" >> $GITHUB_OUTPUT

      - name: Initialize Android project
        run: npm run tauri android init -- --ci
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837

      - name: Patch build.gradle.kts to use environment variables
        run: |
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"

          # Backup original
          cp "$BUILD_GRADLE" "${BUILD_GRADLE}.bak"

          # Replace versionCode and versionName lines to use env vars with fallback
          sed -i 's/versionCode = tauriProperties.*/versionCode = System.getenv("VERSION_CODE")?.toIntOrNull() ?: tauriProperties.getProperty("tauri.android.versionCode", "1").toInt()/' "$BUILD_GRADLE"
          sed -i 's/versionName = tauriProperties.*/versionName = System.getenv("VERSION_NAME") ?: tauriProperties.getProperty("tauri.android.versionName", "1.0")/' "$BUILD_GRADLE"

          echo "Patched build.gradle.kts to use environment variables"
          grep -A 2 "versionCode =" "$BUILD_GRADLE"

      - name: Build Android with custom version
        run: npm run tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          VERSION_CODE: ${{ steps.playstore_version.outputs.version_code }}
          VERSION_NAME: internal-${{ github.run_number }}

      - name: Extract android signing key
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" > src-tauri/gen/android/release.jks.base64
          base64 -d src-tauri/gen/android/release.jks.base64 > src-tauri/gen/android/release.decrypted.jks

      - name: Sign AAB
        run: |
          ${{ env.ANDROID_HOME }}/build-tools/34.0.0/apksigner sign \
            --min-sdk-version 22 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --ks src-tauri/gen/android/release.decrypted.jks \
            --ks-key-alias ${{ secrets.ANDROID_RELEASE_KEY }} \
            --ks-pass pass:${{ secrets.ANDROID_RELEASE_PASSWORD }} \
            --out src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release-signed.aab \
              src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab

      - name: Upload to Google Play - Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.obsidianirc.dev
          releaseFiles: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release-signed.aab
          track: internal
          status: completed
          releaseName: Internal build ${{ github.run_number }}

  publish-android-google-play-production:
    runs-on: ubuntu-latest
    needs: [collect-version, publish-android]
    permissions:
      contents: write
      id-token: write
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WIF_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/androidpublisher'

      - name: Download signed AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: signed-aab
          path: ./

      - name: Upload to Google Play - Production Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.obsidianirc.dev
          releaseFiles: ./ObsidianIRC-${{ needs.collect-version.outputs.current_version }}.aab
          track: production
          status: completed
          releaseName: ObsidianIRC v${{ needs.collect-version.outputs.current_version }}

  publish-ios:
    runs-on: macos-latest
    needs: collect-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Start Tauri iOS build with WS server
        run: |
          npm run tauri ios build -- --open &
          ADDR_FILE="${TMPDIR%/}/com.obsidianirc.dev-server-addr"
          echo "Waiting for $ADDR_FILE…"
          for i in $(seq 1 120); do
            [ -f "$ADDR_FILE" ] && { echo "Addr file ready after ${i}s"; break; }
            sleep 1
          done
          [ -f "$ADDR_FILE" ] || { echo "Addr file never appeared"; exit 1; }

      - name: Archive iOS (unsigned)
        run: |
          xcodebuild \
            -project src-tauri/gen/apple/ObsidianIRC.xcodeproj \
            -scheme ObsidianIRC_iOS \
            -sdk iphoneos \
            -configuration release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/ObsidianIRC.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned .ipa
        run: |
          ARCHIVE_PATH="${{ runner.temp }}/ObsidianIRC.xcarchive"
          WORK_DIR="${{ runner.temp }}/ipa-build"

          # Create working directory
          mkdir -p "$WORK_DIR/Payload"

          # Find and copy .app bundle from archive
          APP_BUNDLE=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" -maxdepth 1 | head -n 1)

          if [ -z "$APP_BUNDLE" ]; then
            echo "Error: No .app bundle found in archive"
            exit 1
          fi

          echo "Found app bundle: $APP_BUNDLE"
          cp -R "$APP_BUNDLE" "$WORK_DIR/Payload/"

          # Copy SwiftSupport if exists (recommended for Swift apps)
          if [ -d "$ARCHIVE_PATH/SwiftSupport" ]; then
            echo "Including SwiftSupport"
            cp -R "$ARCHIVE_PATH/SwiftSupport" "$WORK_DIR/"
          fi

          # Create IPA
          cd "$WORK_DIR"
          zip -r -0 -y ObsidianIRC-${{ needs.collect-version.outputs.current_version }}-unsigned.ipa Payload SwiftSupport 2>/dev/null || \
            zip -r -0 -y ObsidianIRC-${{ needs.collect-version.outputs.current_version }}-unsigned.ipa Payload

          # Move to expected location
          mv ObsidianIRC-${{ needs.collect-version.outputs.current_version }}-unsigned.ipa "${{ runner.temp }}/"

          # Verify IPA structure
          echo "IPA contents:"
          unzip -l "${{ runner.temp }}/ObsidianIRC-${{ needs.collect-version.outputs.current_version }}-unsigned.ipa" | head -n 20

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ needs.collect-version.outputs.draft == 'true' }}
          prerelease: ${{ needs.collect-version.outputs.prerelease == 'true' }}
          body: ${{ needs.collect-version.outputs.release_body }}
          name: ${{ needs.collect-version.outputs.name }}
          tag_name: ${{ needs.collect-version.outputs.tag_name }}
          make_latest: ${{ needs.collect-version.outputs.prerelease != 'true' }}
          files: |
            ${{ runner.temp }}/ObsidianIRC-${{ needs.collect-version.outputs.current_version }}-unsigned.ipa

  publish-web:
    runs-on: ubuntu-latest
    needs: collect-version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          zip -r ObsidianIRC-${{ needs.collect-version.outputs.current_version}}-web.zip ./dist

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ needs.collect-version.outputs.draft == 'true' }}
          prerelease: ${{ needs.collect-version.outputs.prerelease == 'true' }}
          body: ${{ needs.collect-version.outputs.release_body }}
          name: ${{ needs.collect-version.outputs.name }}
          tag_name: ${{ needs.collect-version.outputs.tag_name }}
          make_latest: ${{ needs.collect-version.outputs.prerelease != 'true' }}
          files: |
            ./ObsidianIRC-${{ needs.collect-version.outputs.current_version}}-web.zip
